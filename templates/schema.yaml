{{ if .Values.schema.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Values.component_name }}-schema
spec:
  template:
    spec:
      containers:
        - name: schema-load
          image: public.ecr.aws/w8x4g9h7/roboshop-v3/schema-load
          {{- with .Values.schema_values.env }}
          env:
            {{- toYaml .Values.schema_values.env | nindent 12 }}
          {{- end }}
      restartPolicy: Never
  backoffLimit: 4
{{ end }}